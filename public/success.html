<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Email Sent</title>

    <script>
    const savedTheme = localStorage.getItem("mmmTheme");
    if (savedTheme) {
        document.documentElement.dataset.theme = savedTheme;
    }
    </script>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="success-card">

<div class="success-icon">

Success

</div>

<h1>

Email Sent Successfully

</h1>

<p>

Your email has been successfully sent using Resend.

</p>

<p>

Thank you for using the MMM Email Composer.

</p>

<div class="button-group">

<button
id="newEmail">

Compose New Email

</button>

<button
id="viewAnalytics">

View Analytics

</button>

<button
id="viewHistory">

View History

</button>

</div>

</div>

<script src="theme.js"></script>

<script>

document
.getElementById("newEmail")
.addEventListener("click",()=>{

window.location.href="email.html";

});

document
.getElementById("viewAnalytics")
.addEventListener("click",()=>{

window.location.href="analytics.html";

});

document
.getElementById("viewHistory")
.addEventListener("click",()=>{

window.location.href="history.html";

});

</script>

</body>

</html>
