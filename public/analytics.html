<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Analytics</title>
    <script>
    const savedTheme = localStorage.getItem("mmmTheme");
    if (savedTheme) {
        document.documentElement.dataset.theme = savedTheme;
    }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header class="header">

<div class="logo">
<img
src="https://majlismedia.my/mmm-logo.png"
alt="MMM Logo">
</div>

<div class="company-name">
MAJLIS MEDIA MALAYSIA
</div>

<nav class="top-nav">
<a href="email.html">Compose</a>
<a href="analytics.html" class="active">Analytics</a>
<a href="history.html">History</a>
<button type="button" class="theme-toggle" data-theme-toggle>Dark</button>
</nav>

</header>

<section class="card">

<div class="page-heading">
<div>
<h2>Email Analytics</h2>
<p>Delivery and engagement status for email campaigns.</p>
</div>

<button
id="refreshAnalytics"
type="button">
Refresh
</button>
</div>

<div class="metric-grid">

<div class="metric-card">
<span>Total Sent</span>
<strong id="totalSent">0</strong>
</div>

<div class="metric-card">
<span>Bounced</span>
<strong id="totalBounced">0</strong>
</div>

<div class="metric-card">
<span>Read</span>
<strong id="totalRead">0</strong>
</div>

<div class="metric-card">
<span>Unread</span>
<strong id="totalUnread">0</strong>
</div>

</div>

<div class="list-controls">

<div class="search-field">
<label for="analyticsSearch">Search</label>
<input
type="search"
id="analyticsSearch"
placeholder="Search recipient, subject, group, status...">
</div>

<div class="range-filter" aria-label="Analytics date filter">
<span>Filter</span>
<div class="segmented-control">
<button type="button" class="active" data-analytics-range="all">All</button>
<button type="button" data-analytics-range="day">Daily</button>
<button type="button" data-analytics-range="week">Weekly</button>
<button type="button" data-analytics-range="year">Yearly</button>
</div>
</div>

</div>

<div class="analytics-table">
<table>
<thead>
<tr>
<th>Recipient</th>
<th>Subject</th>
<th>Group</th>
<th>Status</th>
<th>Sent</th>
<th>Read</th>
</tr>
</thead>

<tbody id="analyticsRows">
<tr>
<td colspan="6">Loading analytics...</td>
</tr>
</tbody>
</table>
</div>

</section>

</div>

<script src="analytics.js"></script>

<script src="theme.js"></script>

</body>

</html>
